<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>State Explorer</title>
    <link rel="stylesheet" href="./Resources/Styles/style.css">
</head>
<body>
    <header data-pagename="State Explorer"></header>
    <main class="StateExplorerContent">
        <div class="StateMapSection">
            <p class="StateMapPrompt">
                Click a state to see how it's acting on heat policy. Currently viewing:
                <strong id="MapSelection" class="StateMapPrompt-Selection">All states</strong>.
            </p>
            <div class="mapContainer">
                <div class="mapSelect"></div>
            </div>
            <button type="button" class="StateMap-Reset" hidden>Show all states</button>
        </div>
        <div class="CaseStudiesMeta">
            <p class="CaseStudiesCount"></p>
        </div>
        <div class="ContentContainer" id="CaseStudies"></div>
    </main>
    <footer></footer>
    <script type="module" src="./Resources/Scripts/Script.js"></script>
    <script type="module" src="./Resources/Scripts/ActionMap.js"></script>
</body>
</html>
